services:
  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: CareerSyncAuth
    restart: unless-stopped
    ports:
      - "5001:5000"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - .env.docker
    volumes:
      - ./services/auth:/app
      - /app/node_modules
    networks:
      - careersync-net

  utils:
    build:
      context: ./services/utils
      dockerfile: Dockerfile
    container_name: CareerSyncUtils
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - .env.docker
    volumes:
      - ./services/utils:/app
      - /app/node_modules
    networks:
      - careersync-net

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: CareerSyncApiGateway
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - auth
    env_file:
      - .env.docker
    volumes:
      - ./gateway:/app
      - /app/node_modules
    networks:
      - careersync-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: CareerSyncZookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - careersync-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: CareerSyncKafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - careersync-net

  redis:
    image: redis:7-alpine
    container_name: CareerSyncRedis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - CarrerSync_redis_data:/data
    networks:
      - careersync-net

  redisinsight:
    image: redis/redisinsight:latest
    container_name: CareerSyncRedisInsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    depends_on:
      - redis
    volumes:
      - CarrerSync_redisinsight_data:/data
    networks:
      - careersync-net

  postgres:
    image: postgres:16
    container_name: CareerSyncPostgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: careersync
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - careersync-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: CareerSyncPgAdmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@careersync.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - careersync-net

volumes:
  CarrerSync_redis_data:
  CarrerSync_redisinsight_data:
  pg_data:
  pgadmin_data:

networks:
  careersync-net:
    driver: bridge